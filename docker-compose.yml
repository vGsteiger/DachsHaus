version: '3.9'

networks:
  public:
    driver: bridge
  internal:
    driver: bridge

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: dachshaus
      POSTGRES_USER: dachshaus
      POSTGRES_PASSWORD: dachshaus
    ports:
      - "5432:5432"
    networks:
      - internal
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    networks:
      - internal
    volumes:
      - redis-data:/data

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    networks:
      - internal
    volumes:
      - kafka-data:/var/lib/kafka/data

  gateway:
    build:
      context: .
      dockerfile: infra/docker/node-service.Dockerfile
      args:
        SERVICE_NAME: gateway
    ports:
      - "4000:4000"
    networks:
      - public
      - internal
    environment:
      NODE_ENV: development
      PORT: 4000
    depends_on:
      - auth
      - catalog
      - order
      - customer
      - cart

  storefront:
    build:
      context: .
      dockerfile: infra/docker/node-service.Dockerfile
      args:
        SERVICE_NAME: storefront
    ports:
      - "3000:3000"
    networks:
      - public
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_GRAPHQL_URL: http://localhost:4000/graphql
    depends_on:
      - gateway

  auth:
    build:
      context: .
      dockerfile: infra/docker/kotlin-service.Dockerfile
      args:
        SERVICE_NAME: auth
    ports:
      - "8081:8080"
    networks:
      - internal
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - postgres
      - kafka

  catalog:
    build:
      context: .
      dockerfile: infra/docker/kotlin-service.Dockerfile
      args:
        SERVICE_NAME: catalog
    ports:
      - "8082:8080"
    networks:
      - internal
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - postgres
      - kafka

  order:
    build:
      context: .
      dockerfile: infra/docker/kotlin-service.Dockerfile
      args:
        SERVICE_NAME: order
    ports:
      - "8083:8080"
    networks:
      - internal
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - postgres
      - kafka

  customer:
    build:
      context: .
      dockerfile: infra/docker/kotlin-service.Dockerfile
      args:
        SERVICE_NAME: customer
    ports:
      - "8084:8080"
    networks:
      - internal
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - postgres
      - kafka

  cart:
    build:
      context: .
      dockerfile: infra/docker/kotlin-service.Dockerfile
      args:
        SERVICE_NAME: cart
    ports:
      - "8085:8080"
    networks:
      - internal
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - redis
      - kafka

  streams:
    build:
      context: .
      dockerfile: infra/docker/kotlin-service.Dockerfile
      args:
        SERVICE_NAME: streams
    networks:
      - internal
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - kafka
      - postgres

volumes:
  postgres-data:
  redis-data:
  kafka-data:
