overwrite: true
schema: "http://localhost:4000/graphql"
documents: "../../**/*.graphql"
generates:
  src/generated/types.ts:
    plugins:
      - "typescript"
      - "typescript-operations"
    config:
      skipTypename: false
      withHooks: false
      withHOC: false
      withComponent: false
  src/generated/hooks.ts:
    plugins:
      - "typescript-react-apollo"
    config:
      withHooks: true
      withHOC: false
      withComponent: false
