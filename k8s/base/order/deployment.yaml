apiVersion: apps/v1
kind: Deployment
metadata:
  name: order
  namespace: dachshaus-services
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order
  template:
    metadata:
      labels:
        app: order
    spec:
      serviceAccountName: order
      containers:
        - name: order
          image: order:latest
          ports:
            - containerPort: 8080
