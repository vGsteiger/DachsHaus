apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer
  namespace: dachshaus-services
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer
  template:
    metadata:
      labels:
        app: customer
    spec:
      serviceAccountName: customer
      containers:
        - name: customer
          image: customer:latest
          ports:
            - containerPort: 8080
