name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    # Only run if this is not a bot commit (e.g., dependabot)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for changelog generation

      - name: Get latest tag
        id: get_latest_tag
        run: |
          # Get the latest tag, or use v0.0.0 if no tags exist
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Determine version bump
        id: version_bump
        run: |
          # Get commits since last tag
          if [ "${{ steps.get_latest_tag.outputs.latest_tag }}" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s" ${{ steps.get_latest_tag.outputs.latest_tag }}..HEAD)
          fi

          # Determine version bump based on commit messages
          BUMP="patch"

          # Check for breaking changes (major version bump)
          if echo "$COMMITS" | grep -qiE "BREAKING CHANGE|breaking:"; then
            BUMP="major"
          # Check for features (minor version bump)
          elif echo "$COMMITS" | grep -qiE "^feat(\(.*\))?:|^feature(\(.*\))?:"; then
            BUMP="minor"
          fi

          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "Version bump type: $BUMP"

      - name: Calculate new version
        id: new_version
        run: |
          LATEST_TAG="${{ steps.get_latest_tag.outputs.latest_tag }}"
          BUMP="${{ steps.version_bump.outputs.bump }}"

          # Remove 'v' prefix for calculation
          VERSION=${LATEST_TAG#v}

          # Split version into components
          IFS='.' read -r -a VERSION_PARTS <<< "$VERSION"
          MAJOR="${VERSION_PARTS[0]}"
          MINOR="${VERSION_PARTS[1]:-0}"
          PATCH="${VERSION_PARTS[2]:-0}"

          # Bump version based on bump type
          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Generate release notes
        id: release_notes
        run: |
          LATEST_TAG="${{ steps.get_latest_tag.outputs.latest_tag }}"
          NEW_VERSION="${{ steps.new_version.outputs.new_version }}"

          # Get commits since last tag
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" ${LATEST_TAG}..HEAD)
          fi

          # Get PR numbers from commit messages
          PRS=$(echo "$COMMITS" | grep -oP '\(#\K[0-9]+' || echo "")

          # Build release notes
          RELEASE_NOTES="## What's Changed"$'\n\n'

          # Group commits by type
          FEATURES=$(echo "$COMMITS" | grep -iE "^- (feat|feature)" || echo "")
          FIXES=$(echo "$COMMITS" | grep -iE "^- fix" || echo "")
          DOCS=$(echo "$COMMITS" | grep -iE "^- docs" || echo "")
          CHORES=$(echo "$COMMITS" | grep -iE "^- (chore|build|ci)" || echo "")
          OTHERS=$(echo "$COMMITS" | grep -viE "^- (feat|feature|fix|docs|chore|build|ci)" || echo "")

          if [ -n "$FEATURES" ]; then
            RELEASE_NOTES+="### ✨ Features"$'\n'
            RELEASE_NOTES+="$FEATURES"$'\n\n'
          fi

          if [ -n "$FIXES" ]; then
            RELEASE_NOTES+="### 🐛 Bug Fixes"$'\n'
            RELEASE_NOTES+="$FIXES"$'\n\n'
          fi

          if [ -n "$DOCS" ]; then
            RELEASE_NOTES+="### 📚 Documentation"$'\n'
            RELEASE_NOTES+="$DOCS"$'\n\n'
          fi

          if [ -n "$CHORES" ]; then
            RELEASE_NOTES+="### 🔧 Maintenance"$'\n'
            RELEASE_NOTES+="$CHORES"$'\n\n'
          fi

          if [ -n "$OTHERS" ]; then
            RELEASE_NOTES+="### 🔄 Other Changes"$'\n'
            RELEASE_NOTES+="$OTHERS"$'\n\n'
          fi

          # Add contributors section if there are multiple authors
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            CONTRIBUTORS=$(git log HEAD --format='%an' | sort -u)
          else
            CONTRIBUTORS=$(git log ${LATEST_TAG}..HEAD --format='%an' | sort -u)
          fi
          CONTRIBUTOR_COUNT=$(echo "$CONTRIBUTORS" | wc -l)

          if [ "$CONTRIBUTOR_COUNT" -gt 1 ]; then
            RELEASE_NOTES+="### 👥 Contributors"$'\n\n'
            RELEASE_NOTES+="Thanks to all contributors:"$'\n'
            while IFS= read -r contributor; do
              RELEASE_NOTES+="- $contributor"$'\n'
            done <<< "$CONTRIBUTORS"
            RELEASE_NOTES+=$'\n'
          fi

          RELEASE_NOTES+="**Full Changelog**: https://github.com/${{ github.repository }}/compare/${LATEST_TAG}...${NEW_VERSION}"

          # Save to file for multiline handling
          echo "$RELEASE_NOTES" > /tmp/release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.new_version.outputs.new_version }}
          name: Release ${{ steps.new_version.outputs.new_version }}
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update package.json version
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.new_version }}"
          # Remove 'v' prefix for package.json
          VERSION=${NEW_VERSION#v}

          # Update root package.json
          if [ -f package.json ]; then
            jq --arg version "$VERSION" '.version = $version' package.json > package.json.tmp
            mv package.json.tmp package.json
          fi

          # Commit and push the version bump
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to $VERSION [skip ci]" || echo "No changes to commit"
          git push origin main || echo "Nothing to push"
