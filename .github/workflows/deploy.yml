name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: europe-west6
  GKE_CLUSTER: dachshaus-cluster
  ARTIFACT_REGISTRY: europe-west6-docker.pkg.dev

jobs:
  terraform-apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Terraform Init
        run: |
          cd infra/terraform
          terraform init

      - name: Terraform Plan
        run: |
          cd infra/terraform
          terraform plan -var-file=environments/prod.tfvars

      - name: Terraform Apply
        run: |
          cd infra/terraform
          terraform apply -auto-approve -var-file=environments/prod.tfvars

  build-and-push:
    needs: terraform-apply
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth, catalog, order, customer, cart, streams, gateway, storefront]
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }}

      - name: Determine Dockerfile
        id: dockerfile
        run: |
          if [[ "${{ matrix.service }}" == "gateway" || "${{ matrix.service }}" == "storefront" ]]; then
            echo "dockerfile=infra/docker/node-service.Dockerfile" >> $GITHUB_OUTPUT
          else
            echo "dockerfile=infra/docker/kotlin-service.Dockerfile" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push Docker Image
        run: |
          docker build \
            -f ${{ steps.dockerfile.outputs.dockerfile }} \
            --build-arg SERVICE_NAME=${{ matrix.service }} \
            -t ${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/dachshaus/${{ matrix.service }}:${{ github.sha }} \
            -t ${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/dachshaus/${{ matrix.service }}:latest \
            .
          docker push ${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/dachshaus/${{ matrix.service }}:${{ github.sha }}
          docker push ${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/dachshaus/${{ matrix.service }}:latest

  deploy-to-gke:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }}

      - name: Deploy to Kubernetes
        run: |
          cd k8s
          kubectl apply -k overlays/prod
